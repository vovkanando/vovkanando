services:
  - type: web
    name: nfc-platform
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@nfc.local
      - key: ADMIN_PASS
        value: changeme123
