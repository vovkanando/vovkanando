    }
  
(function(){
  const canvas = document.getElementById('bgc');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight||640; }
  resize();
  window.addEventListener('resize', resize);
  const orbs = [[38,70,55],[220,60,50],[270,50,45],[185,55,48],[45,65,52]].map((o,i) => ({
    bx: [0.15,0.80,0.50,0.20,0.85][i]||0.5,
    by: [0.20,0.25,0.60,0.78,0.72][i]||0.5,
    h:o[0], s:o[1], l:o[2], a:0.45,
    sp:0.00012+i*0.00003, ph:i*1.2, r:0.55-i*0.04
  }));
  function draw(ts){
    const W=canvas.width, H=canvas.height, base=Math.min(W,H);
    ctx.clearRect(0,0,W,H);
    orbs.forEach(o=>{
      const t=ts*o.sp+o.ph;
      const ox=(o.bx+Math.sin(t)*0.10+Math.cos(t*0.6)*0.04)*W;
      const oy=(o.by+Math.cos(t*0.8)*0.10+Math.sin(t*0.5)*0.04)*H;
      const r=o.r*base;
      const pulse=1+Math.sin(t*1.3)*0.07;
      const g=ctx.createRadialGradient(ox,oy,0,ox,oy,r);
      g.addColorStop(0,`hsla(${o.h},${o.s}%,${o.l}%,${o.a*pulse})`);
      g.addColorStop(0.4,`hsla(${o.h},${o.s}%,${o.l-8}%,${o.a*pulse*0.5})`);
      g.addColorStop(1,`hsla(${o.h},${o.s}%,${o.l-15}%,0)`);
      ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
