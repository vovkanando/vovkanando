{% extends "base.html" %}
{% block title %}Активация карты{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)">
  <div style="width:100%;max-width:420px;text-align:center">
    <div style="font-size:56px;margin-bottom:20px">🎉</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;margin-bottom:8px">Твоя карта готова!</div>
    <div style="font-size:14px;color:var(--text-sec);margin-bottom:12px">Код карты: <span style="color:var(--gold);font-weight:600;letter-spacing:3px;font-size:18px">{{code}}</span></div>
    <div style="font-size:13px;color:var(--text-sec);line-height:1.7;margin-bottom:32px">Зарегистрируйся чтобы заполнить свою визитку.<br>Это займёт 2 минуты.</div>
    <a href="/login?activate=1" class="btn-gold" style="display:block;padding:16px;font-size:14px">Создать аккаунт →</a>
    <div style="margin-top:16px;font-size:12px;color:var(--text-muted)">Уже есть аккаунт? <a href="/login" style="color:var(--gold)">Войти</a></div>
  </div>
</div>
{% endblock %}
