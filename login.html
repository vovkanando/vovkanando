{% extends "base.html" %}
{% block title %}Войти — NFC Визитка{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)">

  <div style="width:100%;max-width:400px">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:36px">
      <a href="/" class="logo" style="display:inline-flex;gap:10px;align-items:center">
        <div class="logo-mark">N</div>
        <div class="logo-text" style="font-size:17px">NFC Визитка</div>
      </a>
    </div>

    <!-- Tabs -->
    <div style="display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px">
      <button id="tab-login" onclick="switchTab('login')" style="flex:1;padding:10px;border:none;border-radius:9px;background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;transition:all .2s">Войти</button>
      <button id="tab-reg" onclick="switchTab('reg')" style="flex:1;padding:10px;border:none;border-radius:9px;background:transparent;color:var(--text-sec);font-size:13px;font-weight:500;transition:all .2s">Активировать карту</button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px">
        <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:6px">С возвращением</div>
        <div style="font-size:13px;color:var(--text-sec);margin-bottom:24px">Войди чтобы управлять своей визиткой</div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="l-email" placeholder="your@email.com">
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn-gold" style="width:100%;padding:15px;margin-top:8px" onclick="doLogin()">Войти →</button>
      </div>
    </div>

    <!-- Register Form -->
    <div id="form-reg" style="display:none">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px">
        <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:6px">Активация карты</div>
        <div style="font-size:13px;color:var(--text-sec);margin-bottom:24px">Введи код с карты и создай аккаунт</div>
        <div class="field">
          <label>Код карты</label>
          <input type="text" id="r-code" placeholder="A7X92K" style="text-transform:uppercase;letter-spacing:3px;font-size:18px;font-weight:600;text-align:center">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="your@email.com">
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="r-pass" placeholder="Минимум 6 символов" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <button class="btn-gold" style="width:100%;padding:15px;margin-top:8px" onclick="doRegister()">Создать аккаунт →</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted)">
      <a href="/" style="color:var(--text-sec)">← На главную</a>
    </div>
  </div>
</div>

<script>
function switchTab(t){
  const isLogin = t==='login';
  document.getElementById('form-login').style.display = isLogin?'block':'none';
  document.getElementById('form-reg').style.display   = isLogin?'none':'block';
  document.getElementById('tab-login').style.background = isLogin?'var(--surface2)':'transparent';
  document.getElementById('tab-login').style.color = isLogin?'var(--text)':'var(--text-sec)';
  document.getElementById('tab-reg').style.background = isLogin?'transparent':'var(--surface2)';
  document.getElementById('tab-reg').style.color = isLogin?'var(--text-sec)':'var(--text)';
}

// Auto-switch if URL has ?activate
if(location.search.includes('activate')) switchTab('reg');

async function doLogin(){
  const email=document.getElementById('l-email').value;
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){showToast('Заполни все поля','error');return}
  const r=await api('/api/login',{email,password:pass});
  if(r.ok){location.href=r.redirect}
  else showToast(r.error||'Ошибка','error');
}

async function doRegister(){
  const code=document.getElementById('r-code').value.trim().toUpperCase();
  const email=document.getElementById('r-email').value;
  const pass=document.getElementById('r-pass').value;
  if(!code||!email||!pass){showToast('Заполни все поля','error');return}
  const r=await api('/api/register',{code,email,password:pass});
  if(r.ok){location.href=r.redirect}
  else showToast(r.error||'Ошибка','error');
}
</script>
{% endblock %}
