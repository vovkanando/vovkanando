<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{{p.get('first_name','')}} {{p.get('last_name','')}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;-webkit-font-smoothing:antialiased}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(20,20,20,.95);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(20px);padding:12px 24px;border-radius:100px;font-size:13px;color:#EEE;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const P = {{ p | tojson }};
const THEMES = {
  dark:  {bg:'#07070A',orbs:[[38,70,55],[220,60,50],[270,50,45],[185,55,48],[45,65,52]]},
  ocean: {bg:'#060A14',orbs:[[210,70,50],[190,65,48],[230,55,45],[160,50,45],[45,50,48]]},
  forest:{bg:'#060B08',orbs:[[140,60,42],[100,55,40],[160,50,38],[45,50,45],[80,45,40]]},
  wine:  {bg:'#100608',orbs:[[340,65,42],[320,55,40],[0,60,38],[45,40,40],[280,45,38]]},
  slate: {bg:'#0A0A10',orbs:[[250,60,48],[220,55,45],[280,50,42],[200,50,40],[45,45,42]]},
  smoke: {bg:'#F5F3EF',orbs:[[38,40,75],[220,30,80],[270,25,78],[185,30,76],[45,35,74]]},
};
const th=THEMES[P.theme||'dark']||THEMES.dark;
const IS=P.theme==='smoke';
const TC=IS?'#1A1A1A':'#F0EDE8',TS=IS?'#666':'#888',GC=IS?'#A07840':'#C9A96E',FC=IS?'#AAA':'#333';
const SRF=IS?'rgba(0,0,0,0.05)':'rgba(255,255,255,0.05)',BRD=IS?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.08)';

const init=(P.first_name||' ')[0].toUpperCase()+(P.last_name||' ')[0].toUpperCase();
const avatar=P.photo?`<img src="${P.photo}" style="width:100%;height:100%;object-fit:cover">`
  :`<span style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:${GC};letter-spacing:2px">${init}</span>`;

function btn(href,icon,bg,lbl,val){
  return `<a href="${href}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:16px;padding:15px 18px;background:${SRF};border:1px solid ${BRD};border-radius:16px;text-decoration:none;color:${TC};backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)">
    <div style="width:42px;height:42px;border-radius:11px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0">${icon}</div>
    <div><div style="font-size:10px;color:${TS}">${lbl}</div><div style="font-size:14px;font-weight:500;color:${TC}">${val}</div></div>
    <span style="margin-left:auto;color:${FC};font-size:18px">›</span>
  </a>`;
}

function fixUrl(u){return u&&!u.startsWith('http')?'https://'+u:u||''}

const btns=[];
if(P.phone)btns.push(btn(`tel:${P.phone.replace(/\s/g,'')}`, '📞','rgba(52,199,89,.12)','Телефон',P.phone));
if(P.email)btns.push(btn(`mailto:${P.email}`,'✉️','rgba(201,169,110,.12)','Email',P.email));
if(P.tg)   btns.push(btn(fixUrl(P.tg),'✈️','rgba(38,168,224,.12)','Telegram','@'+P.tg.split('/').pop()));
if(P.ig)   btns.push(btn(fixUrl(P.ig),'📸','rgba(225,48,108,.12)','Instagram','@'+P.ig.split('/').pop()));
if(P.wa)   btns.push(btn(fixUrl(P.wa),'💬','rgba(37,211,102,.12)','WhatsApp','WhatsApp'));
if(P.vk)   btns.push(btn(fixUrl(P.vk),'🔵','rgba(71,118,196,.12)','VKontakte','@'+P.vk.split('/').pop()));
if(P.li)   btns.push(btn(fixUrl(P.li),'💼','rgba(10,102,194,.12)','LinkedIn','LinkedIn'));

const ri='opacity:0;animation:rise .8s cubic-bezier(.16,1,.3,1) ';
document.getElementById('app').innerHTML=`
<div style="position:fixed;inset:0;background:${th.bg};z-index:0;overflow:hidden">
  <canvas id="bgc" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <div style="position:absolute;inset:-40px;backdrop-filter:blur(90px) saturate(1.6);-webkit-backdrop-filter:blur(90px) saturate(1.6)"></div>
  <div style="position:absolute;inset:0;background:${IS?'rgba(250,248,244,.4)':'rgba(7,7,10,.52)'}"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,transparent 30%,${IS?'rgba(250,248,244,.6)':'rgba(7,7,10,.65)'} 100%)"></div>
</div>
<div style="position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:52px 24px 72px;max-width:420px;margin:0 auto;font-family:'DM Sans',sans-serif">
  <div style="width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.06);border:1.5px solid rgba(201,169,110,.35);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:22px;box-shadow:0 0 0 4px rgba(201,169,110,.06),0 8px 32px rgba(0,0,0,.5);${ri}.1s forwards">${avatar}</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:${TC};text-align:center;line-height:1.1;margin-bottom:6px;${ri}.15s forwards">${P.first_name||''}<br><span style="font-weight:600">${P.last_name||''}</span></div>
  ${P.role?`<div style="${ri}.2s forwards;font-size:10px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;color:${GC};margin-bottom:4px">${P.role}</div>`:''}
  ${P.company?`<div style="${ri}.22s forwards;font-size:13px;color:${TS}">${P.company}</div>`:''}
  <div style="width:40px;height:1px;background:linear-gradient(90deg,transparent,${GC},transparent);margin:20px auto 0;${ri}.25s forwards"></div>
  <div style="width:100%;margin-top:32px;display:flex;flex-direction:column;gap:10px;${ri}.35s forwards">${btns.join('')}</div>
  <button onclick="saveContact()" style="width:100%;padding:18px;background:linear-gradient(135deg,#b8922e,#E8C98A 50%,#C9A96E);border:none;border-radius:16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#140f00;cursor:pointer;margin-top:20px;box-shadow:0 4px 24px rgba(201,169,110,.25);${ri}.5s forwards">＋ Сохранить контакт</button>
  ${P.company?`<div style="margin-top:44px;text-align:center;${ri}.65s forwards"><div style="width:4px;height:4px;background:${FC};border-radius:50%;margin:0 auto 9px"></div><div style="font-size:10px;color:${FC};letter-spacing:2px;text-transform:uppercase">${P.company}</div></div>`:''}
</div>`;

// Aurora
(function(){
  const c=document.getElementById('bgc'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize(); window.addEventListener('resize',resize);
  const orbs=th.orbs.map((o,i)=>({bx:[0.15,0.80,0.50,0.20,0.85][i]||.5,by:[0.20,0.25,0.60,0.78,0.72][i]||.5,h:o[0],s:o[1],l:o[2],a:.45,sp:.00012+i*.00003,ph:i*1.2,r:.55-i*.04}));
  function draw(ts){const W=c.width,H=c.height,B=Math.min(W,H);ctx.clearRect(0,0,W,H);orbs.forEach(o=>{const t=ts*o.sp+o.ph,ox=(o.bx+Math.sin(t)*.10)*W,oy=(o.by+Math.cos(t*.8)*.10)*H,r=o.r*B,p=1+Math.sin(t*1.3)*.07,g=ctx.createRadialGradient(ox,oy,0,ox,oy,r);g.addColorStop(0,`hsla(${o.h},${o.s}%,${o.l}%,${o.a*p})`);g.addColorStop(.4,`hsla(${o.h},${o.s}%,${o.l-8}%,${o.a*p*.5})`);g.addColorStop(1,`hsla(${o.h},${o.s}%,${o.l-15}%,0)`);ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()});requestAnimationFrame(draw)}
  requestAnimationFrame(draw);
})();

function saveContact(){
  const lines=['BEGIN:VCARD','VERSION:3.0',`FN:${P.first_name||''} ${P.last_name||''}`,`N:${P.last_name||''};${P.first_name||''};;;`];
  if(P.role)lines.push(`TITLE:${P.role}`);
  if(P.company)lines.push(`ORG:${P.company}`);
  if(P.phone)lines.push(`TEL;TYPE=CELL:${P.phone.replace(/\s/g,'')}`);
  if(P.email)lines.push(`EMAIL:${P.email}`);
  if(P.tg)lines.push(`URL;type=Telegram:${fixUrl(P.tg)}`);
  if(P.ig)lines.push(`URL;type=Instagram:${fixUrl(P.ig)}`);
  lines.push('END:VCARD');
  const blob=new Blob([lines.join('\r\n')],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${(P.first_name||'contact')}_${P.last_name||''}.vcf`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  const t=document.getElementById('toast');t.textContent='Контакт скачан ✓';t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
